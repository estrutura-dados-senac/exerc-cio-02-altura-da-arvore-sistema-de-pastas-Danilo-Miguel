name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Ex01 caso vazio
      id: ex01-caso-vazio
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Ex01 caso vazio
        setup-command: " javac Ex01AlturaDaArvore.java"
        command: printf "0\n" | java Ex01AlturaDaArvore | tr -d "\r" | grep -x "0"
        timeout: 10
        max-score: 10
    - name: Valida altura Ex01
      id: valida-altura-ex01
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Valida altura Ex01
        setup-command: ''
        command: 'printf ''public class ValidaEx01 { public static void main(String[]
          args) { Ex01AlturaDaArvore.Node raiz = Ex01AlturaDaArvore.exemploPastas();
          int h1 = Ex01AlturaDaArvore.altura(raiz); int h2 = Ex01AlturaDaArvore.altura(null);
          if (h1 != 4) throw new RuntimeException("Altura esperada da arvore exemplo:
          4; obtido: " + h1); if (h2 != 0) throw new RuntimeException("Altura esperada
          para null: 0; obtido: " + h2); System.out.println("OK"); }}'' > ValidaEx01.java
          && javac Ex01AlturaDaArvore.java ValidaEx01.java && java ValidaEx01'
        timeout: 10
        max-score: 10
    - name: x01 caso arvore normal
      id: x01-caso-arvore-normal
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: x01 caso arvore normal
        setup-command: javac Ex01AlturaDaArvore.java
        command: printf "5\n1 2\n3 4\n-1 -1\n-1 -1\n-1 -1\n" | java Ex01AlturaDaArvore
          | tr -d "\r" | grep -x "3"
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        EX01-CASO-VAZIO_RESULTS: "${{steps.ex01-caso-vazio.outputs.result}}"
        VALIDA-ALTURA-EX01_RESULTS: "${{steps.valida-altura-ex01.outputs.result}}"
        X01-CASO-ARVORE-NORMAL_RESULTS: "${{steps.x01-caso-arvore-normal.outputs.result}}"
      with:
        runners: ex01-caso-vazio,valida-altura-ex01,x01-caso-arvore-normal
